[defaults]
outfolder       = "/mnt/onboard/_feedbook"          # where EPUBs are written
limit           = 20                                # max articles per feed
kobo            = true                              # produce KEPUB by default
max_image_width = 460                               # resize wider images to this
stdout          = true                              # plain log output instead of progress bars?
dbpath		    = "/mnt/onboard/.adds/feedbook"     # on sdcard

[[feeds]]
url   = "https://hnrss.org/newest?points=100"
