[package]
name = "feedbook"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1.51", features = ["full"] }
reqwest = { version = "0.13", features = ["rustls"] }
feed-rs = "2.3"
dom_smoothie = "0.17"
rusqlite = { version = "0.39", features = ["bundled"] }
epub-builder = "0.8"
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
indicatif = "0.18"
thiserror = "2"
