name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  # Merged Kobo and Kindle ARMv7 since they share the exact same target
  build-armv7-readers:
    needs: test
    name: Build Kobo & Kindle (armv7 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      # Use pre-compiled binaries instead of compiling `cross` from source
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build feedbook (armv7 musleabihf)
        run: cross build --release --target armv7-unknown-linux-musleabihf

      - name: Assemble Kobo & Kindle install kits
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          
          # --- Kobo Assembly ---
          STAGE_KOBO="feedbook-kobo-${VERSION}"
          cp -r install/kobo "${STAGE_KOBO}"
          cp target/armv7-unknown-linux-musleabihf/release/feedbook "${STAGE_KOBO}/.adds/feedbook/feedbook"
          chmod +x "${STAGE_KOBO}/.adds/feedbook/feedbook"
          zip -r "${STAGE_KOBO}.zip" "${STAGE_KOBO}"
          echo "STAGE_KOBO=${STAGE_KOBO}" >> "$GITHUB_ENV"

          # --- Kindle Assembly ---
          STAGE_KINDLE="feedbook-kindle-paperwhite3-and-older-${VERSION}"
          cp -r install/kindle "${STAGE_KINDLE}"
          cp target/armv7-unknown-linux-musleabihf/release/feedbook "${STAGE_KINDLE}/extensions/feedbook/feedbook"
          chmod +x "${STAGE_KINDLE}/extensions/feedbook/feedbook" "${STAGE_KINDLE}/extensions/feedbook/bin/feedbook.sh"
          zip -r "${STAGE_KINDLE}.zip" "${STAGE_KINDLE}"
          echo "STAGE_KINDLE=${STAGE_KINDLE}" >> "$GITHUB_ENV"

      - name: Upload Kobo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE_KOBO }}
          path: ${{ env.STAGE_KOBO }}.zip

      - name: Upload Kindle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE_KINDLE }}
          path: ${{ env.STAGE_KINDLE }}.zip

  build-kindle-aarch64:
    needs: test
    name: Build Kindle install kit (aarch64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build feedbook for Kindle (aarch64 musl)
        run: cross build --release --target aarch64-unknown-linux-musl
      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-kindle-paperwhite4-and-newer-${VERSION}"
          cp -r install/kindle "${STAGE}"
          cp target/aarch64-unknown-linux-musl/release/feedbook "${STAGE}/extensions/feedbook/feedbook"
          chmod +x "${STAGE}/extensions/feedbook/feedbook" "${STAGE}/extensions/feedbook/bin/feedbook.sh"
          zip -r "${STAGE}.zip" "${STAGE}"
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-windows:
    needs: test
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: choco install cmake strawberryperl pkgconfiglite llvm nasm zip -y
        shell: cmd
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build feedbook for Windows
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release
      - name: Assemble install kit
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-windows-x86_64-${VERSION}"
          mkdir "${STAGE}"
          cp target/release/feedbook.exe "${STAGE}/"
          cp install/desktop/feedbook.toml "${STAGE}/"
          zip -r "${STAGE}.zip" "${STAGE}"
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-macos:
    needs: test
    name: Build macOS universal binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew update
          brew install --formula cmake pkg-config llvm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Build feedbook for macOS arm64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build feedbook for macOS x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-macos-universal-${VERSION}"
          mkdir "${STAGE}"
          lipo -create -output "${STAGE}/feedbook" \
            target/aarch64-apple-darwin/release/feedbook \
            target/x86_64-apple-darwin/release/feedbook
          chmod +x "${STAGE}/feedbook"
          cp install/desktop/feedbook.toml "${STAGE}/"
          zip -r "${STAGE}.zip" "${STAGE}"
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-linux:
    needs: test
    name: Build Linux x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build feedbook for Linux (musl)
        run: cross build --release --target x86_64-unknown-linux-musl
      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-linux-x86_64-${VERSION}"
          mkdir "${STAGE}"
          cp target/x86_64-unknown-linux-musl/release/feedbook "${STAGE}/"
          chmod +x "${STAGE}/feedbook"
          cp install/desktop/feedbook.toml "${STAGE}/"
          zip -r "${STAGE}.zip" "${STAGE}"
          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  release:
    name: Create GitHub Release
    needs: [build-armv7-readers, build-windows, build-macos, build-linux, build-kindle-aarch64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
