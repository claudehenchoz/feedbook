name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create releases

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build-kobo:
    needs: test
    name: Build Kobo install kit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build feedbook for Kobo (armv7 musl)
        run: cross build --release --target armv7-unknown-linux-musleabihf

      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-kobo-${VERSION}"

          # Copy the tracked kit skeleton into a staging dir
          cp -r install/kobo "${STAGE}"

          # Inject the freshly built binary
          cp target/armv7-unknown-linux-musleabihf/release/feedbook \
             "${STAGE}/.adds/feedbook/feedbook"
          chmod +x "${STAGE}/.adds/feedbook/feedbook"
          chmod +x "${STAGE}/.adds/feedbook/run.sh"

          # Sanity check: confirm the binary is actually ARM
          file "${STAGE}/.adds/feedbook/feedbook"

          # Zip it, preserving permissions and dot-folders
          zip -r "${STAGE}.zip" "${STAGE}"

          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-windows:
    needs: test
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build feedbook for Windows
        run: cargo build --release

      - name: Assemble install kit
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-windows-x86_64-${VERSION}"

          mkdir "${STAGE}"
          cp target/release/feedbook.exe "${STAGE}/"
          cp install/desktop/feedbook.toml "${STAGE}/"

          zip -r "${STAGE}.zip" "${STAGE}"

          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-macos:
    needs: test
    name: Build macOS universal binary
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Run tests
        run: cargo test

      - name: Build feedbook for macOS arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build feedbook for macOS x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-macos-universal-${VERSION}"

          mkdir "${STAGE}"

          # Combine into a universal binary
          lipo -create -output "${STAGE}/feedbook" \
            target/aarch64-apple-darwin/release/feedbook \
            target/x86_64-apple-darwin/release/feedbook
          chmod +x "${STAGE}/feedbook"

          # Confirm it's a fat binary
          file "${STAGE}/feedbook"

          cp install/desktop/feedbook.toml "${STAGE}/"

          zip -r "${STAGE}.zip" "${STAGE}"

          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  build-linux:
    needs: test
    name: Build Linux x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Run tests
        run: cargo test

      - name: Build feedbook for Linux (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Assemble install kit
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="feedbook-linux-x86_64-${VERSION}"

          mkdir "${STAGE}"
          cp target/x86_64-unknown-linux-musl/release/feedbook "${STAGE}/"
          chmod +x "${STAGE}/feedbook"
          cp install/desktop/feedbook.toml "${STAGE}/"

          zip -r "${STAGE}.zip" "${STAGE}"

          echo "STAGE=${STAGE}" >> "$GITHUB_ENV"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}
          path: ${{ env.STAGE }}.zip

  release:
    name: Create GitHub Release
    needs: [build-kobo, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release and attach all zips
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
